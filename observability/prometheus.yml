global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [prometheus:9090]

  - job_name: litellm
    metrics_path: /metrics
    static_configs:
      - targets: [litellm:4000]

  - job_name: vllm-main
    metrics_path: /metrics
    static_configs:
      - targets: [vllm-main:8000]
        labels:
          model_slot: main

  - job_name: vllm-alt
    metrics_path: /metrics
    static_configs:
      - targets: [vllm-alt:8000]
        labels:
          model_slot: alt

  - job_name: nvidia-gpu
    metrics_path: /metrics
    static_configs:
      - targets: [nvidia-gpu-exporter:9835]

  - job_name: alloy
    metrics_path: /metrics
    static_configs:
      - targets: [alloy:12345]
